<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelGenie — Premium Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #f3fbf8; /* ලස්සන ලා කොළ/සුදු පසුබිම */
            color: #2c3e50;
            display: flex;
            min-height: 100vh;
        }

        /* --- PREMIUM SIDEBAR STYLE --- */
        .sidebar {
            width: 260px;
            background-color: #e8f5e9; /* ස්ක්‍රීන්ෂොට් එකේ තියෙන ලා කොළ පාට */
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            border-right: 1px solid #d1e7dd;
            z-index: 10;
        }

        .sidebar .logo {
            font-size: 24px;
            font-weight: 700;
            color: #0f5132;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-left: 10px;
        }

        .sidebar .logo span {
            color: #009688;
        }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .menu-links a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            color: #4a5d4e;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .menu-links a:hover {
            background-color: rgba(0, 150, 136, 0.08);
            color: #009688;
        }

        .menu-links a.active {
            background-color: #009688; /* තෝරාගෙන ඇති ටැබ් එකේ තද කොළ පාට */
            color: white;
            box-shadow: 0 4px 12px rgba(0, 150, 136, 0.15);
        }

        /* --- MAIN CONTENT LAYOUT --- */
        .main-content {
            margin-left: 260px;
            flex-grow: 1;
            padding: 40px;
            background-color: #f3fbf8;
        }

        /* --- TOP SITE HEADER --- */
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 150, 136, 0.1);
        }

        .site-header .brand-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
        }

        .top-nav {
            display: flex;
            gap: 25px;
        }

        .top-nav a {
            color: #475569;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s;
        }

        .top-nav a:hover {
            color: #009688;
        }

        .page-subtitle {
            font-size: 13px;
            font-weight: 700;
            color: #009688;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 5px;
        }

        .page-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .page-title-row h2 {
            font-size: 36px;
            font-weight: 700;
            color: #1a3a2a;
        }

        /* --- QUICK ACTIONS TOP BUTTONS --- */
        .top-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-top {
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            text-align: center;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-teal {
            background-color: #00a88f;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 168, 143, 0.15);
        }

        .btn-teal:hover {
            background-color: #008f7a;
        }

        /* --- METRICS CARDS GRID --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background-color: white;
            border-radius: 20px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.015);
            border: 1px solid rgba(0, 0, 0, 0.02);
        }

        .stat-card:nth-child(1) { background-color: #eafaf1; } /* Users Card Light Green */
        .stat-card:nth-child(2) { background-color: #f3f0fa; } /* Destinations Card Light Purple */
        .stat-card:nth-child(3) { background-color: #fef7ec; } /* Packages Card Light Orange */
        .stat-card:nth-child(4) { background-color: #eaf4f9; } /* Bookings Card Light Blue */

        .stat-card h3 {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #64748b;
            text-transform: uppercase;
        }

        .stat-card p {
            font-size: 42px;
            font-weight: 700;
            color: #1e293b;
            line-height: 1.2;
        }

        .stat-card .card-sub {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        /* --- TOTAL REVENUE PREMIUM WIDGET --- */
        .revenue-card {
            background-color: #00a88f;
            color: white;
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0, 168, 143, 0.2);
        }

        .revenue-info h3 {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .revenue-info p {
            font-size: 46px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .revenue-info .revenue-sub {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 8px;
        }

        .revenue-badge {
            background-color: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(5px);
        }

        /* --- MODERN TABLE CARD --- */
        .section-container {
            background-color: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.015);
            border: 1px solid #e2e8f0;
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #009688;
        }

        .custom-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .custom-table th {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 14px;
            padding: 16px;
            border-bottom: 1px solid #e2e8f0;
        }

        .custom-table td {
            padding: 16px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 14px;
            color: #334155;
        }

        .custom-table tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-success { background-color: #d1e7dd; color: #0f5132; }
        .status-pending { background-color: #fff3cd; color: #664d03; }

        /* --- BOTTOM QUICK ACTIONS GRID --- */
        .quick-actions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .btn-action-card {
            background-color: white;
            color: #334155;
            padding: 22px;
            border-radius: 16px;
            text-align: center;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-action-card i {
            font-size: 22px;
            color: #009688;
        }

        .btn-action-card:hover {
            border-color: #009688;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 150, 136, 0.08);
            color: #009688;
        }

        @media (max-width: 1024px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .quick-actions-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <i class="fa-solid fa-leaf"></i> Travel<span>Genie</span>
    </div>
    <ul class="menu-links">
        <li><a href="/admin" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
        <li><a href="/admin/users"><i class="fa-solid fa-users"></i> Users</a></li>
        <li><a href="/admin/destinations"><i class="fa-solid fa-map-location-dot"></i> Destinations</a></li>
        <li><a href="/admin/packages"><i class="fa-solid fa-cubes"></i> Packages</a></li>
        <li><a href="/admin/bookings"><i class="fa-solid fa-calendar-check"></i> Bookings</a></li>
        <li><a href="/admin/reviews"><i class="fa-solid fa-star"></i> Reviews</a></li>
        <li><a href="/admin/inbox"><i class="fa-solid fa-envelope"></i> Inbox</a></li>
    </ul>
</div>

<div class="main-content">

    <header class="site-header">
        <a class="brand-title" th:href="@{/}">TravelGenie</a>
        <nav class="top-nav">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/admin}">Dashboard</a>
            <a th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </nav>
    </header>

    <main>
        <div class="page-title-row">
            <div>
                <p class="page-subtitle">Admin Dashboard</p>
                <h2>Operational overview</h2>
            </div>
            <div class="top-actions">
                <button class="btn-top btn-teal" onclick="exportTableToCSV('recent-bookings-report.csv')">Export report</button>
                <a th:href="@{/admin/packages/add}" class="btn-top btn-teal" style="text-decoration:none;">Create package</a>
            </div>
        </div>

        <div class="stats-grid">
            <div
