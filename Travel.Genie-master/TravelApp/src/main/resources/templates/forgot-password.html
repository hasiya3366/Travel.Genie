<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — TravelGenie Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: #f3fbf8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 150, 136, 0.08);
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(0, 150, 136, 0.1);
            text-align: center;
        }
        .brand-logo {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .brand-logo span { color: #009688; }
        .auth-card h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .auth-card p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #009688;
            text-transform: uppercase;
        }
        .form-group input {
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background-color: #f8fafc;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: #009688;
            background-color: white;
        }
        .btn-submit {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 15px;
        }
        .btn-submit:hover { background-color: #d35400; }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            font-size: 14px;
            color: #009688;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }

        /* Status Alerts */
        .alert {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: left;
        }
        .alert-error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        
        /* 🎯 Premium Bypass Link Box Style */
        .bypass-box {
            background-color: #eafaf1;
            border: 1px solid #c3e6cb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: left;
        }
        .bypass-box h4 {
            color: #155724;
            font-size: 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-bypass {
            display: block;
            text-align: center;
            background-color: #009688;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 12px;
            transition: background 0.2s;
        }
        .btn-bypass:hover { background-color: #007a6e; }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="/" class="brand-logo">
        <span>🌿</span> TravelGenie
    </a>
    <h3>Reset Password</h3>
    <p>Enter your verified email address below to generate an instant password recovery token path.</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div th:if="${bypassLink}" class="bypass-box">
        <h4><i class="fa-solid fa-circle-check"></i> Reset Path Generated!</h4>
        <p style="font-size: 13px; color: #155724; margin-bottom: 0;">Click the premium action button below to instantly rewrite your account password configurations.</p>
        <a th:href="${bypassLink}" class="btn-bypass"><i class="fa-solid fa-key"></i> Reset Password Now</a>
    </div>

    <form th:action="@{/forgot-password}" method="post" th:if="${bypassLink == null}">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" required/>
        </div>
        <button type="submit" class="btn-submit">Generate Reset Path</button>
    </form>

    <a href="/login" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
</div>

</body>
</html>
