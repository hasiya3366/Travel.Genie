<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — TravelGenie Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            min-height: 100vh; display: flex; justify-content: center; align-items: center; 
            overflow: hidden; 
        }

        /* වීඩියෝ පසුබිම */
        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1;
        }

        /* Glassmorphism Card Style */
        .auth-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
            text-align: center;
            color: white;
        }

        .brand-logo { 
            font-size: 28px; font-weight: 700; color: #ffffff; 
            text-decoration: none; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px; 
        }
        .brand-logo span { color: #fbbf24; }

        .auth-card h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .auth-card p {
            font-size: 14px;
            color: #f1f5f9;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { font-size: 12px; font-weight: 600; color: white; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .form-group input {
            width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: white;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; background: rgba(255, 255, 255, 0.2); border-color: #fbbf24; }

        .btn-submit {
            background-color: #009688; color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.3s;
            font-size: 15px;
        }
        .btn-submit:hover { background-color: #007a6e; }

        .back-link { display: inline-block; margin-top: 20px; color: #fbbf24; text-decoration: none; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }

        /* 🎯 Premium Overlapping Fix: බයිපාස් box එක ඇතුළේ බටන් එක block එකක් කළා */
        .bypass-box { 
            background: rgba(0, 150, 136, 0.25); 
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 25px 20px; 
            border-radius: 16px; 
            margin-bottom: 10px; 
            text-align: center;
        }
        
        .bypass-box h4 {
            font-size: 16px;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-bypass {
            display: block; /* 💡 මේකෙන් තමයි බටන් එක කොටුව ඇතුළට පිළිවෙළට හැඩගැහෙන්නේ */
            width: 100%;
            background-color: #fbbf24; 
            color: #1a3a2a; 
            text-decoration: none; 
            padding: 14px;
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 15px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }
        .btn-bypass:hover { 
            background-color: #f59e0b; 
            transform: translateY(-1px);
        }

        .alert-error { color: #f8d7da; background: rgba(220, 53, 69, 0.3); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; text-align: left; border: 1px solid rgba(220, 53, 69, 0.2); }
    </style>
</head>
<body>

<video autoplay muted loop class="bg-video">
    <source th:src="@{/videos/login.mp4}" type="video/mp4">
</video>

<div class="auth-card">
    <a href="/" class="brand-logo">
        <span>🌿</span> TravelGenie
    </a>
    <h3>Reset Password</h3>
    
    <!-- 💡 ලින්ක් එක හැදුනම උඩ වැකිය මාරු වෙනවා, නැත්නම් පරණ එකම පේනවා -->
    <p th:if="${bypassLink == null}">Enter your email to generate an instant recovery path.</p>
    <p th:if="${bypassLink != null}">Your configuration path rewrite is ready to finalize.</p>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <!-- 🎯 FIXED CONTAINER: ලින්ක් එක ආවම සුපිරියට කොටුව ඇතුළේ මැදින් වදිනවා -->
    <div th:if="${bypassLink}" class="bypass-box">
        <h4><i class="fa-solid fa-circle-check"></i> Reset Path Generated!</h4>
        <a th:href="${bypassLink}" class="btn-bypass"><i class="fa-solid fa-key"></i> Reset Password Now</a>
    </div>

    <!-- ෆෝම් එක ලින්ක් එක නැති වෙලාවට විතරක් පේනවා -->
    <form th:action="@{/forgot-password}" method="post" th:if="${bypassLink == null}">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="name@example.com" required/>
        </div>
        <button type="submit" class="btn-submit">Generate Reset Path</button>
    </form>

    <a href="/login" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Login</a>
</div>

</body>
</html>
