<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0f766e;
            --primary-hover: #0d9488;
        }

        body, html {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Background Video */
        .bg-video {
            position: fixed;
            top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        main.container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            z-index: 1;
        }

        /* Glassmorphism Card */
        .auth-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            width: 100%;
            max-width: 440px;
            padding: 40px 35px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            color: #ffffff;
        }

        .auth-container h2 { font-size: 1.8rem; text-align: center; margin-bottom: 10px; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .auth-container p { text-align: center; color: rgba(255, 255, 255, 0.9); font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: #ffffff; }
        .form-group input {
            width: 100%; padding: 14px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px; color: #ffffff;
        }
        .form-group input:focus { outline: none; border-color: #34d399; background: rgba(255, 255, 255, 0.2); }

        .btn-login {
            width: 100%; padding: 14px;
            background-color: var(--primary-color);
            color: white; border: none; border-radius: 12px;
            font-weight: 600; cursor: pointer;
        }

        .auth-link { text-align: center; margin-top: 25px; font-size: 0.9rem; }
        .auth-link a { color: #fbbf24; text-decoration: none; font-weight: 600; }

        .error, .success { padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; }
        .error { background-color: rgba(254, 242, 242, 0.8); color: #991b1b; }
        .success { background-color: rgba(240, 253, 244, 0.8); color: #166534; }

        /* Transparent Header/Footer */
        .site-header, .site-footer { background: transparent !important; color: white !important; z-index: 1; }
        .site-header a { color: white !important; }
    </style>
</head>
<body>

<video autoplay muted loop class="bg-video">
    <source th:src="@{/videos/login.mp4}" type="video/mp4">
</video>

<header class="site-header">
    <div class="container header-inner">
        <h1><a th:href="@{/}">TravelGenie</a></h1>
        <nav>
            <a th:href="@{/}">Home</a>
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/register}">Register</a>
        </nav>
    </div>
</header>

<main class="container">
    <div class="auth-container">
        <h2>Reset Password</h2>
        <p>Enter your email address below and we will send you a link to reset your password.</p>

        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div th:if="${success}" class="success" th:text="${success}"></div>

        <form method="post" th:action="@{/forgot-password}">
            <div class="form-group">
                <label th:for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com"/>
            </div>
            <button type="submit" class="btn-login">Send Reset Link</button>
        </form>

        <div class="auth-link">
            <a th:href="@{/login}">Back to Login</a>
        </div>
    </div>
</main>

<footer class="site-footer">
    <div class="container">
        <p>© 2026 TravelGenie. All Rights Reserved.</p>
    </div>
</footer>
</body>
</html>
