<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password — TravelGenie Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: #f3fbf8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 150, 136, 0.08);
            max-width: 450px;
            width: 100%;
            border: 1px solid rgba(0, 150, 136, 0.1);
            text-align: center;
        }
        .brand-logo {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .brand-logo span { color: #009688; }
        .auth-card h3 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #1e293b;
        }
        .auth-card p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: #009688;
            text-transform: uppercase;
        }
        .form-group input {
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background-color: #f8fafc;
            transition: all 0.2s;
        }
        .form-group input:focus {
            border-color: #009688;
            background-color: white;
        }
        .btn-submit {
            background-color: #009688;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 15px;
        }
        .btn-submit:hover { background-color: #007a6e; }

        .alert {
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: left;
        }
        .alert-error {
            color: #721c24;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-logo">
        <span>🌿</span> TravelGenie
    </div>
    <h3>Set New Password</h3>
    <p>Please enter your new strong password configurations below to finalize the secure account overwrite.</p>

    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <form th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}" />

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" placeholder="••••••••" required minlength="4"/>
        </div>

        <button type="submit" class="btn-submit">Update Account Password</button>
    </form>
</div>

</body>
</html>
