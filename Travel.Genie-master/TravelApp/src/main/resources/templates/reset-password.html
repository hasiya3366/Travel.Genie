<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password — TravelGenie Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* වීඩියෝ පසුබිම */
        .bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
        }

        /* වීඩියෝ එක මත අඳුරු Overlay එකක් (අකුරු පැහැදිලි වීමට) */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: -1;
        }

        /* Glassmorphism Card Style */
        .auth-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 90%;
            text-align: center;
            color: white;
        }

        .brand-logo {
            font-size: 28px; font-weight: 700; color: #ffffff;
            text-decoration: none; margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        .brand-logo span { color: #fbbf24; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { font-size: 12px; font-weight: 600; color: white; text-transform: uppercase; margin-bottom: 8px; display: block;}

        .form-group input {
            width: 100%; padding: 14px 16px; border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px; background: rgba(255, 255, 255, 0.1); color: white;
            font-size: 14px; transition: 0.3s;
        }
        .form-group input:focus { outline: none; background: rgba(255, 255, 255, 0.2); border-color: #009688; }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.6); }

        /* 🎯 Invalid input එකට red border එකක් */
        .form-group input.invalid { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        /* 🎯 Field එක යටින්ම පේන validation message එක */
        .field-msg {
            font-size: 12px; margin-top: 6px; min-height: 14px;
            color: #fca5a5;
        }
        .field-msg.valid { color: #6ee7b7; }

        /* 🎯 Password Strength Bar */
        .strength-bar {
            height: 5px; border-radius: 3px; background: rgba(255,255,255,0.2);
            margin-top: 8px; overflow: hidden;
        }
        .strength-bar-fill {
            height: 100%; width: 0%; transition: width 0.3s, background-color 0.3s;
            background-color: #ef4444;
        }

        .btn-submit {
            background-color: #009688; color: white; border: none; padding: 14px;
            border-radius: 12px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.3s;
            font-size: 15px; margin-top: 10px;
        }
        .btn-submit:hover { background-color: #007a6e; transform: translateY(-2px); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .alert-error {
            color: #f8d7da; background: rgba(220, 53, 69, 0.3);
            padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px;
        }
    </style>
</head>
<body>

<div class="overlay"></div>
<video autoplay muted loop class="bg-video">
    <source th:src="@{/videos/login.mp4}" type="video/mp4">
</video>

<div class="auth-card">
    <div class="brand-logo">
        <span>🌿</span> TravelGenie
    </div>
    <h3>Set New Password</h3>
    <p style="margin-bottom: 25px; opacity: 0.9;">Please enter your new strong password below.</p>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/reset-password}" method="post" id="resetForm" novalidate>
        <input type="hidden" name="token" th:value="${token}" />

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="password" id="password" placeholder="••••••••"
                   required minlength="8" autocomplete="new-password"/>
            <div class="strength-bar"><div class="strength-bar-fill" id="strengthFill"></div></div>
            <div class="field-msg" id="passwordMsg">
                Minimum 8 characters, with at least 1 letter and 1 number.
            </div>
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirmPassword" id="confirmPassword" placeholder="••••••••"
                   required minlength="8" autocomplete="new-password"/>
            <div class="field-msg" id="confirmMsg"></div>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">Update Account Password</button>
    </form>
</div>

<script>
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const passwordMsg = document.getElementById('passwordMsg');
    const confirmMsg = document.getElementById('confirmMsg');
    const strengthFill = document.getElementById('strengthFill');
    const submitBtn = document.getElementById('submitBtn');
    const form = document.getElementById('resetForm');

    // 🎯 Password strength check (letters + numbers + length + special char)
    function getStrength(value) {
        let score = 0;
        if (value.length >= 8) score++;
        if (/[A-Za-z]/.test(value) && /[0-9]/.test(value)) score++;
        if (/[^A-Za-z0-9]/.test(value)) score++;
        if (value.length >= 12) score++;
        return score; // 0 - 4
    }

    function validatePassword() {
        const value = passwordInput.value;
        const strength = getStrength(value);

        // Strength bar update
        const percentages = ['10%', '35%', '65%', '90%', '100%'];
        const colors = ['#ef4444', '#ef4444', '#f59e0b', '#22c55e', '#16a34a'];
        strengthFill.style.width = percentages[strength];
        strengthFill.style.backgroundColor = colors[strength];

        const hasMinLength = value.length >= 8;
        const hasLetterAndNumber = /[A-Za-z]/.test(value) && /[0-9]/.test(value);
        const isValid = hasMinLength && hasLetterAndNumber;

        if (value.length === 0) {
            passwordInput.classList.remove('invalid');
            passwordMsg.textContent = 'Minimum 8 characters, with at least 1 letter and 1 number.';
            passwordMsg.classList.remove('valid');
        } else if (!isValid) {
            passwordInput.classList.add('invalid');
            passwordMsg.textContent = !hasMinLength
                ? 'Password must be at least 8 characters.'
                : 'Password must include both letters and numbers.';
            passwordMsg.classList.remove('valid');
        } else {
            passwordInput.classList.remove('invalid');
            passwordMsg.textContent = 'Strong password ✓';
            passwordMsg.classList.add('valid');
        }

        validateConfirm(); // password එක වෙනස් වුනාම confirm එකත් recheck කරන්න
        return isValid;
    }

    function validateConfirm() {
        const value = confirmInput.value;
        if (value.length === 0) {
            confirmInput.classList.remove('invalid');
            confirmMsg.textContent = '';
            confirmMsg.classList.remove('valid');
            return false;
        }

        const matches = value === passwordInput.value;
        if (!matches) {
            confirmInput.classList.add('invalid');
            confirmMsg.textContent = 'Passwords do not match.';
            confirmMsg.classList.remove('valid');
        } else {
            confirmInput.classList.remove('invalid');
            confirmMsg.textContent = 'Passwords match ✓';
            confirmMsg.classList.add('valid');
        }
        return matches;
    }

    passwordInput.addEventListener('input', validatePassword);
    confirmInput.addEventListener('input', validateConfirm);

    form.addEventListener('submit', function (e) {
        const passwordOk = validatePassword();
        const confirmOk = validateConfirm();

        if (!passwordOk || !confirmOk) {
            e.preventDefault();
        }
    });
</script>

</body>
</html>
