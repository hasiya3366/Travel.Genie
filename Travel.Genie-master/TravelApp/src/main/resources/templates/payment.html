<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelGenie — Secure Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f3fbf8; color: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .checkout-container { background: white; width: 100%; max-width: 480px; padding: 35px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 150, 136, 0.05); border: 1px solid #d1e7dd; }
        .brand { font-size: 22px; font-weight: 700; color: #009688; text-align: center; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .payment-summary { background: #e8f5e9; padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #c8e6c9; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; color: #64748b; }
        .summary-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 18px; color: #1a3a2a; border-top: 1px dashed #a5d6a7; padding-top: 10px; margin-top: 10px; }
        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 13px; font-weight: 500; color: #2c3e50; margin-bottom: 8px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 15px; color: #94a3b8; }
        input { width: 100%; padding: 14px 15px 14px 45px; border: 1px solid #cbd5e1; border-radius: 12px; font-size: 15px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #009688; }
        .row-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .row-grid input { padding-left: 15px; }
        .btn-pay { width: 100%; background: #009688; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 12px rgba(0, 150, 136, 0.2); transition: background 0.3s; margin-top: 10px; }
        .btn-pay:hover { background: #00796b; }
        
        /* Processing Popup Overlay */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 999; }
        .popup-box { background: white; padding: 40px; border-radius: 24px; text-align: center; max-width: 360px; width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #009688; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        .success-icon { display: none; font-size: 60px; color: #2ecc71; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="checkout-container">
    <div class="brand"><i class="fa-solid fa-shield-halved"></i> Travel<span>Genie Pay</span></div>
    
    <div class="payment-summary">
    <div class="summary-item"><span>Package:</span><span style="font-weight: 600;" th:text="${packageName}">Mirissa Whale Watching</span></div>
    <div class="summary-item"><span>Travelers:</span><span th:text="${travelers + ' Person(s)'}">5 Persons</span></div>
    <div class="summary-total"><span>Total Amount:</span><span th:text="'LKR ' + ${totalPrice}">LKR 900.00</span></div>
</div>

    <form id="paymentForm" onsubmit="processPayment(event)">
        <div class="form-group">
            <label>Cardholder Name</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user"></i>
                <input type="text" placeholder="John Doe" required>
            </div>
        </div>

        <div class="form-group">
            <label>Card Number</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-credit-card"></i>
                <input type="text" id="cardNum" placeholder="4242 4242 4242 4242" maxlength="19" required>
            </div>
        </div>

        <div class="row-grid">
            <div class="form-group">
                <label>Expiration Date</label>
                <input type="text" id="expDate" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div class="form-group">
                <label>CVV / CVC</label>
                <input type="password" id="cvv" placeholder="123" maxlength="3" required>
            </div>
        </div>

        <button type="submit" class="btn-pay"><i class="fa-solid fa-lock"></i> Pay LKR 900.00</button>
    </form>
</div>

<div class="overlay" id="loadingOverlay">
    <div class="popup-box">
        <div class="spinner" id="paymentSpinner"></div>
        <i class="fa-solid fa-circle-check success-icon" id="successIcon"></i>
        <h3 id="popupStatus" style="font-weight: 600; margin-bottom: 10px;">Processing Payment...</h3>
        <p id="popupSubtext" style="font-size: 14px; color: #64748b;">Please do not close or refresh this page.</p>
    </div>
</div>

<script>
    // Card Formatters
    document.getElementById('cardNum').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        let matches = v.match(/\d{4,16}/g);
        let match = matches && matches[0] || '';
        let parts = [];
        for (let i=0, len=match.length; i<len; i+=4) { parts.push(match.substring(i, i+4)); }
        if (parts.length > 0) { e.target.value = parts.join(' '); } else { e.target.value = v; }
    });

    document.getElementById('expDate').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        if (v.length >= 2) { e.target.value = v.substring(0, 2) + '/' + v.substring(2, 4); } else { e.target.value = v; }
    });

    function processPayment(e) {
        e.preventDefault();
        const overlay = document.getElementById('loadingOverlay');
        const spinner = document.getElementById('paymentSpinner');
        const successIcon = document.getElementById('successIcon');
        const statusText = document.getElementById('popupStatus');
        const subtext = document.getElementById('popupSubtext');

        overlay.style.display = 'flex';

        // 1. Fake Loading Screen (2.5 Seconds)
        setTimeout(() => {
            spinner.style.display = 'none';
            successIcon.style.display = 'block';
            statusText.innerText = 'Payment Successful!';
            subtext.innerText = 'Your booking has been secured. Redirecting to Bookings Dashboard...';
            
            // 2. Redirect to Bookings list (After another 2 seconds)
            setTimeout(() => {
                window.location.href = '/admin/bookings';
            }, 2000);

        }, 2500);
    }
</script>
</body>
</html>
