<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>TravelGenie — Shared Fragments</title>
</head>
<body>

<div th:fragment="chatbot">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <button class="chatbot-trigger-btn" id="openChatBtn" onclick="toggleChat()">
        <i class="fa-solid fa-robot"></i> ASK AI
    </button>

    <div class="chat-window chat-hidden" id="chat-box">
        <div class="chat-header">
            <div class="chat-bot-identity">
                <i class="fa-solid fa-robot"></i>
                <div>
                    <h4>Travel Genie</h4>
                    <span class="chat-status">AI Expedition Guide</span>
                </div>
            </div>
            <button class="chat-close-btn" onclick="toggleChat()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        
        <div class="chat-messages" id="chat-logs"></div>
        
        <div class="chat-footer">
            <input type="text" id="chat-input" placeholder="Ask about your trip..." onkeypress="if(event.key === 'Enter') sendChatMessage()">
            <button onclick="sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

<style>
    /* Scope Isolation Styling */
    .chatbot-trigger-btn, .chat-window, .chat-window * {
        font-family: 'Poppins', sans-serif !important;
        box-sizing: border-box;
    }

    /* JavaScript Toggle Class (Ensures smooth open/close control) */
    .chat-hidden {
        display: none !important;
    }
    .chat-visible {
        display: flex !important;
    }

    .chatbot-trigger-btn { 
        position: fixed; 
        bottom: 30px; 
        right: 30px; 
        z-index: 999999 !important; 
        background: linear-gradient(135deg, #0e291b 0%, #06150e 100%) !important; 
        color: #f3f4f6 !important; 
        border: 1px solid #d4af37 !important; 
        padding: 14px 24px !important; 
        border-radius: 10px !important; 
        cursor: pointer !important; 
        display: flex !important; 
        align-items: center !important; 
        gap: 10px !important; 
        box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
        font-weight: 600 !important;
        font-size: 14px !important;
        transition: transform 0.2s ease !important;
    }
    .chatbot-trigger-btn:hover {
        transform: translateY(-2px) !important;
    }
    
    .chat-window { 
        position: fixed; 
        bottom: 95px; 
        right: 30px; 
        width: 350px; 
        height: 450px; 
        background: #0e1424 !important; 
        border: 1px solid #222222 !important; 
        border-radius: 16px !important; 
        box-shadow: 0 12px 40px rgba(0,0,0,0.7) !important; 
        flex-direction: column !important; 
        overflow: hidden !important; 
        z-index: 999999 !important; 
    }
    
    .chat-header { 
        background: #070a12 !important; 
        padding: 12px 15px !important; 
        display: flex !important; 
        justify-content: space-between !important; 
        align-items: center !important; 
        border-bottom: 1px solid #222 !important; 
    }
    
    .chat-bot-identity { 
        display: flex !important; 
        align-items: center !important; 
        gap: 12px !important; 
        color: #d4af37 !important; 
    }
    .chat-bot-identity i {
        font-size: 18px !important;
        color: #d4af37 !important;
    }
    .chat-bot-identity h4 {
        margin: 0 !important;
        font-size: 14px !important;
        font-weight: 600 !important;
        color: #d4af37 !important;
    }
    .chat-status {
        font-size: 11px !important;
        color: #e5e7eb !important;
        opacity: 0.7 !important;
        display: block !important;
    }
    
    .chat-close-btn { 
        background: rgba(255, 255, 255, 0.05) !important; 
        border: none !important; 
        color: white !important; 
        width: 26px !important; 
        height: 26px !important; 
        border-radius: 50% !important; 
        cursor: pointer !important; 
        display: flex !important; 
        align-items: center !important; 
        justify-content: center !important; 
        transition: 0.3s !important; 
        padding: 0 !important;
    }
    .chat-close-btn i {
        font-size: 14px !important;
        color: white !important;
    }
    .chat-close-btn:hover { background: #d4af37 !important; }
    .chat-close-btn:hover i { color: black !important; }
    
    .chat-messages { 
        flex-grow: 1 !important; 
        padding: 15px !important; 
        overflow-y: auto !important; 
        background: rgba(11,15,25,0.6) !important; 
        display: flex !important; 
        flex-direction: column !important; 
    }
    .message { 
        max-width: 85% !important; 
        padding: 10px 14px !important; 
        border-radius: 12px !important; 
        margin-bottom: 10px !important; 
        font-size: 13px !important; 
        color: white !important; 
        line-height: 1.5 !important; 
    }
    .bot-msg { background: #141b2d !important; border: 1px solid #222 !important; align-self: flex-start !important; white-space: pre-line !important; }
    .user-msg { background: #d4af37 !important; color: black !important; align-self: flex-end !important; margin-left: auto !important; font-weight: 500 !important; }
    
    .chat-footer { 
        padding: 12px !important; 
        background: #070a12 !important; 
        display: flex !important; 
        gap: 8px !important; 
        border-top: 1px solid #222 !important; 
        align-items: center !important;
    }
    .chat-footer input { 
        flex-grow: 1 !important; 
        background: #141b2d !important; 
        border: 1px solid #333 !important; 
        padding: 10px 12px !important; 
        border-radius: 8px !important; 
        color: white !important; 
        outline: none !important; 
        font-size: 13px !important;
    }
    .chat-footer button { 
        background: #d4af37 !important; 
        border: none !important; 
        padding: 10px 14px !important; 
        border-radius: 8px !important; 
        color: black !important; 
        cursor: pointer !important; 
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        height: 38px !important;
    }
</style>

    <script>
        function toggleChat() {
            const box = document.getElementById("chat-box");
            
            // Clean logic using CSS classes to ensure toggle behaves accurately
            if (box.classList.contains("chat-hidden")) {
                box.classList.remove("chat-hidden");
                box.classList.add("chat-visible");
            } else {
                box.classList.remove("chat-visible");
                box.classList.add("chat-hidden");
            }

            const logs = document.getElementById("chat-logs");
            if (logs.innerHTML.trim() === "") {
                appendAIMessage(`
                    <div style="text-align: center; width: 100%;">
                        <i class="fa-solid fa-compass" style="font-size: 20px; color: #d4af37; margin-bottom: 5px; display: block;"></i>
                        <h4 style="margin: 0; color: #d4af37; font-size: 15px; font-weight: 600;">Ayubowan! 🌴</h4>
                        <p style="font-size: 12px; color: #e5e7eb; margin: 5px 0; line-height: 1.4;">Welcome to Travel Genie! Ready to explore Sri Lanka?</p>
                    </div>
                `);
            }
        }

        function appendUserMessage(msg) {
            document.getElementById("chat-logs").insertAdjacentHTML('beforeend', `<div class="message user-msg">${msg}</div>`);
            const logs = document.getElementById("chat-logs");
            logs.scrollTop = logs.scrollHeight;
        }

        function appendAIMessage(msg) {
            document.getElementById("chat-logs").insertAdjacentHTML('beforeend', `<div class="message bot-msg">${msg}</div>`);
            const logs = document.getElementById("chat-logs");
            logs.scrollTop = logs.scrollHeight;
        }

        function sendChatMessage() {
            const input = document.getElementById("chat-input");
            const msg = input.value.trim();
            if (!msg) return;
            
            if (['fuck', 'bitch', 'huthth', 'pakaya', 'pako', 'huka'].some(word => msg.toLowerCase().includes(word))) {
                appendAIMessage("Hey Dear, let's keep it clean! Tell me how I can help you with your trip.");
                input.value = ""; return;
            }

            appendUserMessage(msg);
            input.value = "";
            
            const loadingId = "loading-" + Date.now();
            document.getElementById("chat-logs").insertAdjacentHTML('beforeend', `<div id="${loadingId}" class="message bot-msg">Thinking... 🤔</div>`);
            const logs = document.getElementById("chat-logs");
            logs.scrollTop = logs.scrollHeight;
            
            fetch('https://travel-genie-wokv.onrender.com/api/chatbot/generate-itinerary', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ destination: msg, durationDays: 4 })
            })
            .then(res => res.text())
            .then(data => {
                const loadingEl = document.getElementById(loadingId);
                if(loadingEl) loadingEl.remove();
                appendAIMessage(data);
            })
            .catch(() => {
                const loadingEl = document.getElementById(loadingId);
                if(loadingEl) loadingEl.remove();
                appendAIMessage("Error: Check server connection.");
            });
        }
    </script>
</div>

</body>
</html>
