<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>TravelGenie — Shared Fragments</title>
    <style>
        /* 🎨 බොට් එක සයිට් එකේ ලස්සනට පේන්න ඕන සයිස් එක මෙතනින් පාලනය කරනවා මචං */
        .botpress-embedded-container {
            width: 380px;
            height: 500px;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999999;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            border: 1px solid #1a2e29;
        }
    </style>
</head>
<body>

<!-- ========================================== -->
<!-- 1. LIVE PRODUCTION EMBEDDED CHATBOT FRAGMENT -->
<!-- ========================================== -->
<div th:fragment="chatbot">

    <!-- 🎯 Botpress එකෙන් හොයන නිවැරදි Container ID එක -->
    <div id="bp-embedded-webchat" class="botpress-embedded-container"></div>

    <!-- 🎯 Botpress Scripts Injections -->
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/07/01/21/20260701214322-Q82605O6.js" defer></script>

</div>

</body>
</html>
