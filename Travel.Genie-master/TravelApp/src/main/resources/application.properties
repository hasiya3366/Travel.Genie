# ===============================
# APP CONFIGURATION
# ===============================
spring.application.name=TravelApp
# Railway එකෙන් දෙන dynamic port එක ගන්න (නැත්නම් local 8080 වැඩ)
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIGURATION (Railway & Localhost Compatible)
# ===============================
# Railway variables නැත්නම් fallback එක විදිහට localhost එකට connect වෙනවා
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:traveldb}?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIBERNATE / JPA SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# THYMELEAF SETTINGS
# ===============================
# Production (Railway) එකේදී cache එක true කරලා performance වැඩි කරගන්නවා
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}

# ===============================
# CUSTOM APP SETTINGS
# ===============================
travelapp.default-admin.email=admin@example.com
travelapp.default-admin.password=admin123

# ===============================
# EMAIL CONFIGURATION (SMTP)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=travel.genie51@gmail.com
spring.mail.password=yaxxvjdfxzeidgge
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# LOGGING
# ===============================
# Production එකේදී full debug logs ඕන නැති නිසා ඕන නම් default false කරන්න පුළුවන්
debug=false
gemini.api.key=${GEMINI_API_KEY}
