# ===============================
# APP CONFIGURATION
# ===============================
spring.application.name=TravelApp
server.port=8080

# ===============================
# DATABASE CONFIGURATION (Localhost)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/traveldb?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# XAMPP පාවිච්චි කරනවා නම් password එක හිස්ව තියන්න.
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIBERNATE / JPA SETTINGS
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# THYMELEAF SETTINGS
# ===============================
# Localhost එකේ code කරද්දි වෙනස්කම් ඉක්මනින් බලාගන්න cache eka false කරලා තියෙන්නේ
spring.thymeleaf.cache=false

# ===============================
# CUSTOM APP SETTINGS
# ===============================
travelapp.default-admin.email=admin@example.com
travelapp.default-admin.password=admin123

